# PLACEHOLDER — NOT a real sops file and NOT encrypted. bootstrap.sh overwrites this with
# a sops/age-encrypted file built from the operator's answers (see secrets/PLACEHOLDERS.md).
# The flake tolerates this template because nixos/common.nix sets `sops.validateSopsFiles = false`,
# so `nix flake check` evaluates before bootstrap has encrypted anything. Never commit real secrets.
#
# Secret keys consumed by the NixOS configs (path → which VM/unit reads it):
#   tailscale/authkey        → common.nix   services.tailscale.authKeyFile        (@@TS_AUTHKEY@@)
#   hermes/env               → hermes.nix   services.hermes-agent.environmentFiles (BLUEBUBBLES_PASSWORD, …)
#   vault/master-password    → vault.nix    agent-vault EnvironmentFile            (@@AGENT_VAULT_MASTER_PASSWORD@@)
#   vault/static-keys        → vault.nix    credential-provisioning oneshot        (OPENAI/EXA/HONCHO/GITHUB)
#   vault/google-oauth       → vault.nix    OAuth connect provisioning             (client id/secret)
tailscale:
  authkey: "@@TS_AUTHKEY@@"
hermes:
  env: |
    BLUEBUBBLES_PASSWORD=@@BLUEBUBBLES_PASSWORD@@
vault:
  # KEY=VALUE form: this secret is wired as a systemd EnvironmentFile, which only
  # parses `NAME=value` lines (a raw scalar would never set the env var).
  master-password: |
    AGENT_VAULT_MASTER_PASSWORD=@@AGENT_VAULT_MASTER_PASSWORD@@
  static-keys: |
    OPENAI_API_KEY=@@OPENAI_API_KEY@@
    EXA_API_KEY=@@EXA_API_KEY@@
    HONCHO_API_KEY=@@HONCHO_API_KEY@@
    GITHUB_TOKEN=@@GITHUB_TOKEN@@
  google-oauth: |
    GOOGLE_OAUTH_CLIENT_ID=@@GOOGLE_OAUTH_CLIENT_ID@@
    GOOGLE_OAUTH_CLIENT_SECRET=@@GOOGLE_OAUTH_CLIENT_SECRET@@
