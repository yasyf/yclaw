# Follow upstream hermes-agent: weekly (and on demand) re-lock JUST that input and open a PR.
# Merging the PR changes flake.lock, which triggers build-images.yml (flake.lock is in its
# push path filter) to rebuild + republish the image on the new upstream rev.
#
# The `substituteInPlace --replace-fail` anchors in nixos/hermes.nix are intentional
# tripwires: if a bump moves the patched lines, the image build FAILS LOUDLY — the signal
# for a human to re-roll the DM-reply-routing patch before the PR is merged.
name: bump-upstream

on:
  schedule:
    - cron: "23 4 * * 1" # Mondays 04:23 UTC (ahead of the weekly build)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: nix flake update hermes-agent
    runs-on: ubuntu-latest # re-locking is platform-agnostic; no build here
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Re-lock hermes-agent + nixpkgs-unstable
        # nixpkgs-unstable is re-locked too so the VMs' Tailscale (overlaid from unstable in
        # flake.nix) tracks current upstream — nixos-25.05 pins an old release the dashboard flags.
        run: nix flake update hermes-agent nixpkgs-unstable

      - name: Open PR with the lock bump
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: flake.lock
          branch: ci/bump-upstream
          delete-branch: true
          commit-message: "chore(deps): bump hermes-agent + nixpkgs-unstable flake inputs"
          title: "chore(deps): bump hermes-agent + nixpkgs-unstable"
          body: |
            Automated weekly `nix flake update hermes-agent nixpkgs-unstable`.

            hermes-agent tracks the upstream agent; nixpkgs-unstable carries the current
            Tailscale (overlaid onto the NixOS VMs in `flake.nix`) and the Go toolchain.

            Merging triggers `build-images.yml` to rebuild + republish the hermes image on
            the new revs.

            If the build fails on a `substituteInPlace --replace-fail` anchor in
            `nixos/hermes.nix`, upstream moved the patched lines — re-roll the
            DM-reply-routing patch before merging.
