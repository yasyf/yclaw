# sops creation rules TEMPLATE. scripts/lib/secrets.sh mints the age key and renders the
# RESOLVED rules to ~/.yclaw/state/sops.yaml (replacing @@AGE_PUBLIC_KEY@@ with the public key);
# this committed file keeps the placeholder and is never mutated. The PRIVATE key lands on each
# VM at /var/lib/sops-nix/key.txt (never committed).
keys:
  # Quoted: an unquoted scalar cannot start with `@` (a reserved YAML indicator).
  - &host "@@AGE_PUBLIC_KEY@@" # scripts/lib/secrets.sh renders the public key into ~/.yclaw/state/sops.yaml.
creation_rules:
  - path_regex: secrets/[^/]+\.sops\.yaml$
    key_groups:
      - age:
          - *host
